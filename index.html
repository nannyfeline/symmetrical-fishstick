// ── localStorage helpers ──
const lsGet=(k,def)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):def;}catch{return def;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

// ── Styles ──
const cs={background:"#fff8f0",border:"1px solid #e8d5c0",borderRadius:10,padding:20};
const ls={fontSize:11,textTransform:"uppercase",letterSpacing:1,color:"#9a7b6a",fontWeight:600,marginBottom:4,display:"block"};
const is={width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid #e8d5c0",background:"#fff8f0",color:"#3d2b1f",fontSize:14,boxSizing:"border-box",fontFamily:"Georgia, serif"};

function Inp({label,k,form,set,type="text",opts}){
  const ch=v=>set(f=>({...f,[k]:v}));
  return(
    <div style={{marginBottom:14}}>
      {type!=="checkbox"&&<label style={ls}>{label}</label>}
      {opts
        ?<select value={form[k]} onChange={e=>ch(e.target.value)} style={is}>{opts.map(o=><option key={o}>{o}</option>)}</select>
        :type==="textarea"
          ?<textarea value={form[k]} onChange={e=>ch(e.target.value)} rows={4} style={{...is,resize:"vertical"}}/>
          :<input type={type} value={form[k]} onChange={e=>ch(e.target.value)} style={is}/>
      }
    </div>
  );
}

function Btn({label,onClick,v="primary"}){
  const cols={primary:{bg:"#8b4513",c:"#fff"},danger:{bg:"#c0392b",c:"#fff"},secondary:{bg:"#e8d5c0",c:"#5a3a25"}};
  const col=cols[v];
  return <button onClick={onClick} style={{padding:"8px 18px",borderRadius:6,border:"none",cursor:"pointer",fontSize:14,fontWeight:600,marginRight:8,fontFamily:"Georgia, serif",background:col.bg,color:col.c}}>{label}</button>;
}

function Fld({label,val}){
  if(!val&&val!==0)return null;
  return <div style={{marginBottom:14}}><div style={ls}>{label}</div><div style={{color:"#3d2b1f",fontSize:15,lineHeight:1.75,whiteSpace:"pre-wrap"}}>{val}</div></div>;
}

  const[ef,setEf]=useState({...E0});
  const[showTF,setShowTF]=useState(false);
  const[showEF,setShowEF]=useState(false);
  const[viewIdx,setViewIdx]=useState(null);
  const[editTi,setEditTi]=useState(null);
  const[editEi,setEditEi]=useState(null);

  useEffect(()=>lsSet("rj_tbr",tbr),[tbr]);
  useEffect(()=>lsSet("rj_entries",entries),[entries]);

  const saveTBR=()=>{
    if(!tbrForm.title.trim())return;
    setTbr(l=>editTi!==null?l.map((x,i)=>i===editTi?{...tbrForm}:x):[...l,{...tbrForm}]);
    setTbrForm({...T0});setEditTi(null);setShowTF(false);
  };

  const saveEntry=()=>{
    if(!ef.title.trim())return;
    let ni;
    if(editEi!==null){setEntries(l=>l.map((x,i)=>i===editEi?{...ef}:x));ni=editEi;}
    else{ni=entries.length;setEntries(l=>[...l,{...ef}]);}
    setEf({...E0});setEditEi(null);setShowEF(false);setViewIdx(ni);setTab("entries");
  };

  const goEntry=(i)=>{setViewIdx(i);setTab("entries");setShowEF(false);};
  const ent=viewIdx!==null?entries[viewIdx]:null;

  return(
    <div style={{minHeight:"100vh",background:"#faf7f2"}}>
      {/* Header */}
      <div style={{background:"#8b4513",padding:"22px 32px"}}>
        <div style={{fontSize:26,fontWeight:700,color:"#fff8f0",letterSpacing:.5}}>📖 My Reading Journal 2026</div>
        <div style={{fontSize:13,color:"rgba(255,248,240,0.65)",marginTop:4}}>A personal record of books read, loved, and discovered</div>
      </div>

      {/* Nav */}
      <div style={{background:"#6b3410",display:"flex",paddingLeft:20}}>
        {[["tbr","📚 To Be Read"],["index","📖 Index"],["entries","📝 Book Entries"]].map(([key,lbl])=>(
          <button key={key} onClick={()=>{setTab(key);if(key!=="entries"){setShowEF(false);setViewIdx(null);}}}
            style={{background:"none",border:"none",cursor:"pointer",padding:"12px 22px",fontFamily:"Georgia, serif",fontSize:14,
              color:tab===key?"#fff":"rgba(255,255,255,0.5)",fontWeight:tab===key?700:400,
              borderBottom:tab===key?"3px solid #d4956a":"3px solid transparent"}}>{lbl}</button>
        ))}
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"28px 24px"}}>

        {/* ══ TBR ══ */}
        {tab==="tbr"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{margin:0,color:"#8b4513",fontSize:22}}>To Be Read</h2>
              <Btn label="+ Add Book" onClick={()=>{setTbrForm({...T0});setEditTi(null);setShowTF(true);}}/>
            </div>
            {showTF&&(
              <div style={{...cs,marginBottom:24}}>
                <h3 style={{margin:"0 0 18px",color:"#8b4513",fontSize:18}}>{editTi!==null?"Edit":"Add"} TBR Book</h3>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 20px"}}>
                  <Inp label="Title *" k="title" form={tbrForm} set={setTbrForm}/>
                  <Inp label="Series" k="series" form={tbrForm} set={setTbrForm}/>
                  <Inp label="Author(s)" k="authors" form={tbrForm} set={setTbrForm}/>
                  <Inp label="Format" k="format" form={tbrForm} set={setTbrForm} opts={FMT}/>
                  <Inp label="Publication Year" k="pubDate" form={tbrForm} set={setTbrForm}/>
                </div>
                <label style={{display:"flex",alignItems:"center",gap:9,cursor:"pointer",fontSize:14,color:"#3d2b1f",marginBottom:18}}>
                  <input type="checkbox" checked={tbrForm.isARC} onChange={e=>setTbrForm(f=>({...f,isARC:e.target.checked}))} style={{width:16,height:16}}/>
                  This is an ARC (Advance Reader Copy)
                </label>
                <Btn label={editTi!==null?"Save Changes":"Add to TBR"} onClick={saveTBR}/>
                <Btn label="Cancel" v="secondary" onClick={()=>{setShowTF(false);setEditTi(null);}}/>
              </div>
            )}
            {tbr.length===0&&!showTF
              ?<div style={{textAlign:"center",color:"#b0917a",padding:"56px 0",fontSize:15}}>Your TBR list is empty. Add a book above!</div>
              :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                {tbr.map((b,i)=>(
                  <div key={i} style={{...cs,display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"14px 18px"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,color:"#3d2b1f",fontSize:16}}>
                        {b.title}
                        {b.isARC&&<span style={{background:"#d4956a",color:"#fff",fontSize:11,padding:"2px 8px",borderRadius:10,marginLeft:8,fontWeight:600}}>ARC</span>}
                      </div>
                      {b.series&&<div style={{color:"#7a5c4a",fontSize:13,marginTop:3}}>{b.series}</div>}
                      <div style={{color:"#9a7b6a",fontSize:13,marginTop:5}}>{[b.authors,b.format,b.pubDate].filter(Boolean).join(" · ")}</div>
                    </div>
                    <div style={{display:"flex",gap:6,marginLeft:16,flexShrink:0}}>
                      <button onClick={()=>{setTbrForm({...b});setEditTi(i);setShowTF(true);}} style={{background:"none",border:"1px solid #e8d5c0",borderRadius:5,padding:"4px 12px",cursor:"pointer",fontSize:13,color:"#8b4513",fontFamily:"Georgia,serif"}}>Edit</button>
                      <button onClick={()=>setTbr(l=>l.filter((_,j)=>j!==i))} style={{background:"none",border:"1px solid #e8d5c0",borderRadius:5,padding:"4px 12px",cursor:"pointer",fontSize:13,color:"#c0392b",fontFamily:"Georgia,serif"}}>Remove</button>
                    </div>
                  </div>
                ))}
              </div>
            }
          </div>
        )}

        {/* ══ INDEX ══ */}
        {tab==="index"&&(
          <div>
            <h2 style={{margin:"0 0 6px",color:"#8b4513",fontSize:22}}>Index — Books Read in 2026</h2>
            <div style={{color:"#9a7b6a",fontSize:13,marginBottom:20}}>Click any title to view the full entry. {entries.length} books read.</div>
            <div style={{border:"1px solid #e8d5c0",borderRadius:10,overflow:"hidden"}}>
              {entries.map((e,i)=>(
                <div key={i} onClick={()=>goEntry(i)}
                  style={{display:"flex",alignItems:"center",padding:"10px 16px",background:i%2===0?"#fff8f0":"#faf4ec",cursor:"pointer",borderBottom:i<entries.length-1?"1px solid #f0e4d4":"none"}}>
                  {e.imageUrl&&<img src={e.imageUrl} alt="" style={{width:36,height:50,objectFit:"cover",borderRadius:3,marginRight:10,flexShrink:0}}/>}
                  <span style={{color:"#d4956a",fontWeight:700,width:36,flexShrink:0,fontSize:13}}>{i+1}.</span>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontWeight:600,color:"#3d2b1f",fontSize:14}}>{e.title}</span>
                    {e.series&&<span style={{color:"#9a7b6a",fontSize:12}}> · {e.series}</span>}
                    {e.authors&&<span style={{color:"#7a5c4a",fontSize:12}}> — {e.authors}</span>}
                  </div>
                  <div style={{color:"#9a7b6a",fontSize:11,flexShrink:0,marginLeft:10}}>{e.dateFinished||""}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ══ ENTRIES ══ */}
        {tab==="entries"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <h2 style={{margin:0,color:"#8b4513",fontSize:22}}>Book Entries</h2>
              {!showEF&&<Btn label="+ New Entry" onClick={()=>{setEf({...E0});setEditEi(null);setShowEF(true);setViewIdx(null);}}/>}
            </div>

            {/* Form */}
            {showEF&&(
              <div style={cs}>
                <h3 style={{margin:"0 0 18px",color:"#8b4513",fontSize:18}}>{editEi!==null?"Edit Entry":"New Book Entry"}</h3>
                <div style={{borderBottom:"1px solid #e8d5c0",marginBottom:18}}/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 20px"}}>
                  <Inp label="Title *" k="title" form={ef} set={setEf}/>
                  <Inp label="Series" k="series" form={ef} set={setEf}/>
                  <Inp label="Author(s)" k="authors" form={ef} set={setEf}/>
                  <Inp label="Contributor(s)" k="contributors" form={ef} set={setEf}/>
                  <Inp label="Format" k="format" form={ef} set={setEf} opts={FMT}/>
                  <Inp label="Publication Year" k="pubDate" form={ef} set={setEf}/>
                  <Inp label="Date Started" k="dateStarted" form={ef} set={setEf} type="date"/>
                  <Inp label="Date Finished" k="dateFinished" form={ef} set={setEf} type="date"/>
                  <Inp label="Length" k="length" form={ef} set={setEf}/>
                  <Inp label="Genre" k="genre" form={ef} set={setEf}/>
                </div>
                <Inp label="Tropes" k="tropes" form={ef} set={setEf}/>
                <Inp label="Cover Image URL" k="imageUrl" form={ef} set={setEf}/>
                <label style={{display:"flex",alignItems:"center",gap:9,cursor:"pointer",fontSize:14,color:"#3d2b1f",marginBottom:18}}>
                  <input type="checkbox" checked={ef.isRecommendation} onChange={e=>setEf(f=>({...f,isRecommendation:e.target.checked}))} style={{width:16,height:16}}/>
                  This was a recommendation
                </label>
                <div style={{borderBottom:"1px solid #e8d5c0",marginBottom:18}}/>
                <Inp label="Summary" k="summary" form={ef} set={setEf} type="textarea"/>
                <Inp label="What are you going to take away from this book?" k="takeaway" form={ef} set={setEf} type="textarea"/>
                <Inp label="Favorite Quotes" k="quotes" form={ef} set={setEf} type="textarea"/>
                <Inp label="Thoughts" k="thoughts" form={ef} set={setEf} type="textarea"/>
                <Inp label="Would you recommend this book?" k="wouldRecommend" form={ef} set={setEf} opts={["Yes","No","Maybe"]}/>
                <div style={{marginTop:20}}>
                  <Btn label={editEi!==null?"Save Changes":"Save Entry"} onClick={saveEntry}/>
                  <Btn label="Cancel" v="secondary" onClick={()=>{setShowEF(false);setEditEi(null);}}/>
                </div>
              </div>
            )}

            {/* Detail view */}
            {!showEF&&viewIdx!==null&&ent&&(()=>{
              const rcMap={Yes:{bg:"#edf7ed",bo:"#b8ddb8",tx:"#2d7a2d"},No:{bg:"#fdecea",bo:"#f5c6c2",tx:"#a92020"},Maybe:{bg:"#fefae6",bo:"#f0dfa0",tx:"#8a6a00"}};
              const rc=rcMap[ent.wouldRecommend]||rcMap.Maybe;
              return(
                <div>
                  <button onClick={()=>setViewIdx(null)} style={{background:"none",border:"none",color:"#8b4513",cursor:"pointer",fontSize:13,marginBottom:18,padding:0,fontFamily:"Georgia,serif"}}>← All Entries</button>
                  <div style={cs}>
                    <div style={{display:"flex",gap:20,marginBottom:4,alignItems:"flex-start"}}>
                      {ent.imageUrl&&<img src={ent.imageUrl} alt={ent.title} style={{width:140,borderRadius:6,flexShrink:0}}/>}
                      <div style={{flex:1}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                          <div>
                            <h2 style={{margin:"0 0 4px",color:"#8b4513",fontSize:24}}>{ent.title}</h2>
                            {ent.series&&<div style={{color:"#9a7b6a",fontSize:14,marginBottom:4}}>{ent.series}</div>}
                          </div>
                          <div style={{flexShrink:0,marginLeft:16,display:"flex",gap:8}}>
                            <Btn label="Edit" onClick={()=>{setEf({...ent});setEditEi(viewIdx);setShowEF(true);setViewIdx(null);}}/>
                            <Btn label="Delete" v="danger" onClick={()=>{setEntries(l=>l.filter((_,j)=>j!==viewIdx));setViewIdx(null);}}/>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div style={{borderBottom:"1px solid #e8d5c0",margin:"14px 0"}}/>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 40px"}}>
                      <Fld label="Author(s)" val={ent.authors}/>
                      <Fld label="Contributor(s)" val={ent.contributors}/>
                      <Fld label="Format" val={ent.format}/>
                      <Fld label="Genre" val={ent.genre}/>
                      <Fld label="Date Started" val={ent.dateStarted}/>
                      <Fld label="Date Finished" val={ent.dateFinished}/>
                      <Fld label="Publication Year" val={ent.pubDate}/>
                      <Fld label="Length" val={ent.length}/>
                    </div>
                    <Fld label="Tropes" val={ent.tropes}/>
                    <div style={{marginBottom:14}}>
                      <div style={ls}>Was this a recommendation?</div>
                      <div style={{color:"#3d2b1f",fontSize:15}}>{ent.isRecommendation?"Yes":"No"}</div>
                    </div>
                    <div style={{borderBottom:"1px solid #e8d5c0",margin:"14px 0"}}/>
                    {ent.summary&&<div style={{marginBottom:20}}><div style={ls}>Summary</div><div style={{color:"#3d2b1f",fontSize:15,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{ent.summary}</div></div>}
                    {ent.takeaway&&<div style={{background:"#fff3e6",border:"1px solid #f0d4b0",borderRadius:8,padding:"14px 18px",marginBottom:20}}><div style={ls}>What I'm taking away</div><div style={{color:"#3d2b1f",fontSize:15,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{ent.takeaway}</div></div>}
                    {ent.quotes&&<div style={{marginBottom:20}}><div style={ls}>Favorite Quotes</div><div style={{borderLeft:"4px solid #d4956a",paddingLeft:16,color:"#4a3020",fontSize:15,lineHeight:1.9,whiteSpace:"pre-wrap",fontStyle:"italic"}}>{ent.quotes}</div></div>}
                    {ent.thoughts&&<div style={{marginBottom:20}}><div style={ls}>Thoughts</div><div style={{color:"#3d2b1f",fontSize:15,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{ent.thoughts}</div></div>}
                    {ent.wouldRecommend&&<div style={{background:rc.bg,border:`1px solid ${rc.bo}`,borderRadius:8,padding:"12px 18px",display:"flex",alignItems:"center",gap:12}}>
                      <span style={{...ls,marginBottom:0,display:"inline"}}>Would Recommend:</span>
                      <span style={{fontWeight:700,fontSize:16,color:rc.tx}}>{ent.wouldRecommend==="Yes"?"✓ Yes":ent.wouldRecommend==="No"?"✗ No":"~ Maybe"}</span>
                    </div>}
                  </div>
                </div>
              );
            })()}

            {/* Entry list */}
            {!showEF&&viewIdx===null&&(
              entries.length===0
                ?<div style={{textAlign:"center",color:"#b0917a",padding:"56px 0"}}>No entries yet.</div>
                :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {entries.map((e,i)=>(
                    <div key={i} onClick={()=>setViewIdx(i)} style={{...cs,cursor:"pointer",display:"flex",gap:14,alignItems:"flex-start",padding:"14px 18px"}}>
                      {e.imageUrl&&<img src={e.imageUrl} alt="" style={{width:50,flexShrink:0,borderRadius:4}}/>}
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,color:"#3d2b1f",fontSize:16}}>{e.title}</div>
                        {e.series&&<div style={{color:"#9a7b6a",fontSize:13,marginTop:2}}>{e.series}</div>}
                        {e.authors&&<div style={{color:"#7a5c4a",fontSize:13,marginTop:2}}>by {e.authors}</div>}
                        <div style={{color:"#9a7b6a",fontSize:12,marginTop:4}}>{[e.format,e.genre?e.genre.split(" ").slice(0,3).join(" ")+"…":"",e.dateFinished?`Finished ${e.dateFinished}`:""].filter(Boolean).join(" · ")}</div>
                      </div>
                      <span style={{color:"#d4956a",fontSize:20,flexShrink:0}}>→</span>
                    </div>
                  ))}
                </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
